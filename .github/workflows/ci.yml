name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ubuntu:
    name: Build (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

  build-windows:
    name: Build (windows-2022)
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Visual Studio 2022)
        shell: powershell
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022"

      - name: Build (Release)
        shell: powershell
        run: |
          cd build
          cmake --build . --config Release
